<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QR Generátor</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<style>
    body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto;
        background: #0f172a;
        color: #e5e7eb;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
    }

    .container {
        width: 90%;
        max-width: 400px;
        background: #111827;
        padding: 25px;
        border-radius: 18px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        text-align: center;
    }

    h1 {
        margin-bottom: 20px;
        font-size: 22px;
        font-weight: 600;
    }

    input {
        width: 100%;
        padding: 14px;
        border-radius: 12px;
        border: none;
        margin-bottom: 15px;
        font-size: 16px;
        background: #1f2933;
        color: white;
    }

    input::placeholder {
        color: #9ca3af;
    }

    button {
        width: 100%;
        padding: 14px;
        border: none;
        border-radius: 12px;
        font-size: 16px;
        margin-top: 8px;
        cursor: pointer;
        font-weight: 600;
        transition: 0.2s;
    }

    .generate {
        background: #2563eb;
        color: white;
    }

    .download {
        background: #374151;
        color: white;
    }

    button:active {
        transform: scale(0.97);
    }

    #qrcode {
        margin-top: 20px;
        padding: 10px;
        background: white;
        border-radius: 12px;
        display: inline-block;
    }
</style>
</head>

<body>

<div class="container">
    <h1>QR Kód Generátor</h1>

    <input type="text" id="urlInput" placeholder="https://pelda.hu">

    <button class="generate" onclick="generateQR()">Generálás</button>
    <button class="download" onclick="downloadQR()">Letöltés</button>

    <div id="qrcode"></div>
</div>

<script>
let qr;

function fixURL(url) {
    if (!url.startsWith("http://") && !url.startsWith("https://")) {
        return "https://" + url;
    }
    return url;
}

function generateQR() {
    let url = document.getElementById("urlInput").value.trim();

    if (!url) {
        alert("Adj meg egy URL-t!");
        return;
    }

    url = fixURL(url);

    document.getElementById("qrcode").innerHTML = "";

    qr = new QRCode(document.getElementById("qrcode"), {
        text: url,
        width: 260,
        height: 260
    });
}

function downloadQR() {
    const img = document.querySelector("#qrcode img");

    if (!img) {
        alert("Előbb generálj QR kódot!");
        return;
    }

    const link = document.createElement("a");
    link.href = img.src;
    link.download = "qr-kod.png";
    link.click();
}
</script>

</body>
</html>
