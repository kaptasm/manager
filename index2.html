<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<title>Magyarország Jelölő</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

<style>

body{
font-family:Arial;
text-align:center;
}

#map{
height:600px;
width:90%;
margin:auto;
}

.controls{
margin:10px;
}

</style>
</head>

<body>

<h2>Magyarország település jelölő</h2>

<div class="controls">

Projekt neve:
<input id="projectName">

<button onclick="newProject()">Új térkép</button>
<button onclick="saveProject()">Mentés</button>

<br><br>

Település keresés:
<input id="city">
<button onclick="searchCity()">Keresés</button>

<br><br>

<button onclick="saveImage()">Kép mentése</button>

</div>

<div id="map"></div>

<h3>Mentett projektek</h3>
<div id="projectList"></div>

<script>

var map = L.map('map').setView([47.1625,19.5033],7);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
attribution:'Map'
}).addTo(map);

let markers=[];

function addMarker(lat,lon,name){

let marker=L.marker([lat,lon]).addTo(map);

marker.bindPopup(name);

markers.push({lat,lon,name});

}

/* település keresés */

async function searchCity(){

let city=document.getElementById("city").value;

let url=`https://nominatim.openstreetmap.org/search?city=${city}&country=Hungary&format=json`;

let res=await fetch(url);

let data=await res.json();

if(data.length>0){

let lat=data[0].lat;
let lon=data[0].lon;

addMarker(lat,lon,city);

map.setView([lat,lon],11);

}else{

alert("Nem található település");

}

}

/* projekt mentés */

function saveProject(){

let name=document.getElementById("projectName").value;

if(!name){
alert("Adj nevet a projektnek");
return;
}

localStorage.setItem("map_"+name,JSON.stringify(markers));

loadProjects();

}

/* új projekt */

function newProject(){

markers=[];

map.eachLayer(function(layer){
if(layer instanceof L.Marker){
map.removeLayer(layer);
}
});

}

/* projekt lista */

function loadProjects(){

let list=document.getElementById("projectList");

list.innerHTML="";

for(let key in localStorage){

if(key.startsWith("map_")){

let name=key.replace("map_","");

let btn=document.createElement("button");

btn.innerText=name;

btn.onclick=function(){
loadProject(name);
};

list.appendChild(btn);

}

}

}

/* projekt betöltés */

function loadProject(name){

newProject();

let data=JSON.parse(localStorage.getItem("map_"+name));

data.forEach(m=>{
addMarker(m.lat,m.lon,m.name);
});

}

/* kép mentés (javított) */

function saveImage(){

html2canvas(document.querySelector("#map"),{
scale:3
}).then(canvas=>{

let link=document.createElement("a");

let name=document.getElementById("projectName").value || "terkep";

link.download=name+".png";

link.href=canvas.toDataURL("image/png");

link.click();

});

}

loadProjects();

</script>

</body>
</html>
