<!DOCTYPE html>
<html lang="hu">

<head>
<meta charset="UTF-8">
<title>Magyarország térkép</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

<style>

body{
margin:0;
font-family:Arial;
background:#f2f2f2;
}

#controls{
background:white;
padding:12px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
display:flex;
gap:10px;
align-items:center;
justify-content:center;
}

#controls h2{
margin:0 20px 0 0;
font-size:18px;
}

input{
padding:7px;
border-radius:5px;
border:1px solid #ccc;
}

button{
padding:7px 12px;
border:none;
border-radius:5px;
background:#d32f2f;
color:white;
cursor:pointer;
}

button:hover{
background:#b71c1c;
}

#map{
height:600px;
width:100%;
}

</style>

</head>

<body>

<div id="controls">

<h2>Magyarország térkép</h2>

<input id="city" placeholder="Település (pl. Szeged)">

<button onclick="searchCity()">Keresés</button>

<button onclick="saveImage()">Kép mentése</button>

</div>

<div id="map"></div>

<script>

/* Magyarország határ */

var hungaryBounds = [
[45.7,16.0],
[48.7,23.0]
];

/* térkép */

var map = L.map('map',{
maxBounds:hungaryBounds,
maxBoundsViscosity:1,
minZoom:7,
maxZoom:12
}).setView([47.1625,19.5033],7);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
attribution:'© OpenStreetMap',
crossOrigin:true
}).addTo(map);

map.fitBounds(hungaryBounds);

/* marker */

function addMarker(lat,lon,name){

let marker=L.marker([lat,lon]).addTo(map);

marker.bindPopup(name);

}

/* keresés */

async function searchCity(){

let city=document.getElementById("city").value;

if(!city) return;

let url=`https://nominatim.openstreetmap.org/search?city=${city}&country=Hungary&format=json`;

let res=await fetch(url);

let data=await res.json();

if(data.length>0){

let lat=parseFloat(data[0].lat);
let lon=parseFloat(data[0].lon);

addMarker(lat,lon,city);

map.setView([lat,lon],10);

}else{

alert("Település nem található");

}

}

/* kép mentés */

function saveImage(){

html2canvas(document.querySelector("#map"),{
useCORS:true,
allowTaint:true,
scale:3
}).then(canvas=>{

let link=document.createElement("a");

link.download="magyarorszag_terkep.png";

link.href=canvas.toDataURL("image/png");

link.click();

});

}

</script>

</body>
</html>
