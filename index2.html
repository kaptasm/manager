<!DOCTYPE html>
<html lang="hu">

<head>
<meta charset="UTF-8">
<title>Magyarország térkép jelölő</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

<style>

body{
font-family: system-ui, Arial;
margin:0;
background:#f5f6fa;
}

header{
background:white;
padding:15px;
box-shadow:0 2px 8px rgba(0,0,0,0.08);
display:flex;
justify-content:center;
align-items:center;
gap:10px;
flex-wrap:wrap;
}

header h1{
font-size:18px;
margin-right:20px;
}

input{
padding:8px 10px;
border-radius:6px;
border:1px solid #ccc;
font-size:14px;
}

button{
padding:8px 12px;
border:none;
border-radius:6px;
background:#e53935;
color:white;
font-weight:500;
cursor:pointer;
}

button:hover{
background:#c62828;
}

#map{
height:calc(100vh - 70px);
width:100%;
}

</style>

</head>

<body>

<header>

<h1>Magyarország térkép</h1>

<input id="city" placeholder="Település (pl. Szeged)">

<button onclick="searchCity()">Keresés</button>

<button onclick="saveImage()">Kép mentése</button>

</header>

<div id="map"></div>

<script>

/* Magyarország határ */

var hungaryBounds = [
[45.7,16.0],
[48.7,23.0]
];

/* térkép */

var map = L.map('map',{
maxBounds: hungaryBounds,
maxBoundsViscosity:1,
minZoom:7,
maxZoom:12
}).setView([47.1625,19.5033],7);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
attribution:'© OpenStreetMap',
crossOrigin:true
}).addTo(map);

map.fitBounds(hungaryBounds);

let markers=[];

/* marker */

function addMarker(lat,lon,name){

let marker=L.marker([lat,lon]).addTo(map);

marker.bindPopup(name);

markers.push(marker);

}

/* település keresés */

async function searchCity(){

let city=document.getElementById("city").value;

if(!city) return;

let url=`https://nominatim.openstreetmap.org/search?city=${city}&country=Hungary&format=json`;

let res=await fetch(url);

let data=await res.json();

if(data.length>0){

let lat=parseFloat(data[0].lat);
let lon=parseFloat(data[0].lon);

addMarker(lat,lon,city);

map.setView([lat,lon],10);

}else{

alert("Település nem található");

}

}

/* térkép mentés */

function saveImage(){

html2canvas(document.querySelector("#map"),{

useCORS:true,
allowTaint:true,
scale:3

}).then(canvas=>{

let link=document.createElement("a");

link.download="magyarorszag_terkep.png";

link.href=canvas.toDataURL("image/png");

link.click();

});

}

</script>

</body>
</html>
