<!DOCTYPE html>
<html lang="hu">

<head>
<meta charset="UTF-8">
<title>Magyarország térkép jelölő</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

<style>

body{
font-family:Arial;
text-align:center;
margin:0;
}

#topbar{
padding:10px;
background:#f0f0f0;
}

#map{
height:600px;
width:100%;
}

button{
padding:8px;
margin:4px;
}

input{
padding:6px;
}

#projectList button{
margin:3px;
}

</style>

</head>

<body>

<div id="topbar">

Projekt neve:
<input id="projectName" placeholder="pl: kutatás">

<button onclick="newProject()">Új projekt</button>
<button onclick="saveProject()">Projekt mentése</button>

<br><br>

Település:
<input id="city" placeholder="pl: Szeged">

<button onclick="searchCity()">Keresés</button>

<button onclick="saveImage()">Kép mentése</button>

</div>

<div id="map"></div>

<h3>Mentett projektek</h3>
<div id="projectList"></div>

<script>

var map = L.map('map').setView([47.1625,19.5033],7);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
attribution:'© OpenStreetMap',
crossOrigin:true
}).addTo(map);

let markers=[];

/* marker hozzáadás */

function addMarker(lat,lon,name){

let marker=L.marker([lat,lon]).addTo(map);

marker.bindPopup(name);

markers.push({
lat:lat,
lon:lon,
name:name
});

}

/* település keresés */

async function searchCity(){

let city=document.getElementById("city").value;

if(!city) return;

let url=`https://nominatim.openstreetmap.org/search?city=${city}&country=Hungary&format=json`;

let res=await fetch(url);

let data=await res.json();

if(data.length>0){

let lat=parseFloat(data[0].lat);
let lon=parseFloat(data[0].lon);

addMarker(lat,lon,city);

map.setView([lat,lon],11);

}else{

alert("Település nem található");

}

}

/* projekt mentés */

function saveProject(){

let name=document.getElementById("projectName").value;

if(!name){

alert("Adj projekt nevet!");

return;

}

localStorage.setItem("map_"+name,JSON.stringify(markers));

loadProjects();

}

/* új projekt */

function newProject(){

markers=[];

map.eachLayer(function(layer){

if(layer instanceof L.Marker){

map.removeLayer(layer);

}

});

}

/* projekt betöltés */

function loadProject(name){

newProject();

let data=JSON.parse(localStorage.getItem("map_"+name));

data.forEach(m=>{

addMarker(m.lat,m.lon,m.name);

});

}

/* projektek listája */

function loadProjects(){

let list=document.getElementById("projectList");

list.innerHTML="";

for(let key in localStorage){

if(key.startsWith("map_")){

let name=key.replace("map_","");

let btn=document.createElement("button");

btn.innerText=name;

btn.onclick=function(){

loadProject(name);

};

list.appendChild(btn);

}

}

}

/* kép mentés */

function saveImage(){

html2canvas(document.querySelector("#map"),{

useCORS:true,
allowTaint:true,
scale:3

}).then(canvas=>{

let link=document.createElement("a");

let name=document.getElementById("projectName").value || "terkep";

link.download=name+".png";

link.href=canvas.toDataURL("image/png");

link.click();

});

}

loadProjects();

</script>

</body>
</html>
