<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mark Életszervező</title>

<style>
:root{
    --bg:#f8fafc;
    --card:#ffffff;
    --text:#0f172a;
    --accent:#2563eb;
    --border:#e2e8f0;
    --highlight:#dc2626;
}

body.dark{
    --bg:#0f172a;
    --card:#1e293b;
    --text:#f1f5f9;
    --accent:#3b82f6;
    --border:#334155;
    --highlight:#ef4444;
}

body{
    margin:0;
    font-family: system-ui, -apple-system, sans-serif;
    background:var(--bg);
    color:var(--text);
    transition:0.3s;
}

header{
    padding:20px;
    text-align:center;
    font-size:22px;
    font-weight:600;
}

nav{
    display:flex;
    justify-content:center;
    flex-wrap:wrap;
    gap:10px;
    padding-bottom:15px;
}

nav button{
    background:none;
    border:1px solid var(--border);
    padding:8px 14px;
    border-radius:20px;
    cursor:pointer;
    color:var(--text);
}

nav button:hover{
    border-color:var(--accent);
}

.container{
    max-width:1100px;
    margin:auto;
    padding:20px;
}

.section{
    display:none;
}

.active{
    display:block;
}

input, select{
    width:100%;
    padding:10px;
    margin:8px 0;
    border-radius:8px;
    border:1px solid var(--border);
    background:var(--card);
    color:var(--text);
}

button.addBtn{
    background:var(--accent);
    color:white;
    border:none;
    padding:10px;
    border-radius:8px;
    cursor:pointer;
}

.event{
    padding:8px 10px;
    margin:6px 0;
    border-left:3px solid var(--accent);
    font-size:14px;
}

.highlightEvent{
    border-left:4px solid var(--highlight);
    font-weight:600;
}

/* NAPTÁR */

.calendarHeader{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:15px;
}

.calendar{
    display:grid;
    grid-template-columns:repeat(7,1fr);
    gap:10px;
}

.day{
    padding:8px;
    border:1px solid var(--border);
    border-radius:10px;
    min-height:90px;
    font-size:12px;
}

.today{
    border:2px solid var(--accent);
}

.dayNumber{
    font-weight:600;
    margin-bottom:4px;
}

footer{
    text-align:center;
    padding:20px;
    font-size:13px;
    opacity:0.6;
}

.modeToggle{
    position:fixed;
    top:15px;
    right:15px;
    cursor:pointer;
    font-size:14px;
    padding:6px 12px;
    border-radius:20px;
    border:1px solid var(--border);
    background:var(--card);
}
</style>
</head>
<body>

<div class="modeToggle" onclick="toggleMode()">🌙 / ☀</div>

<header>
Mark Életszervező
</header>

<nav>
<button onclick="showSection('today')">Ma</button>
<button onclick="showSection('calendar')">Naptár</button>
<button onclick="showSection('regular')">Rendszeres</button>
<button onclick="showSection('school')">Iskola</button>
<button onclick="showSection('afternoon')">Délután</button>
<button onclick="showSection('highlight')">Kiemelt</button>
</nav>

<div class="container">

<div id="today" class="section active">
<h3>Mai programok</h3>
<div id="todayList"></div>
</div>

<div id="calendar" class="section">
<div class="calendarHeader">
<button onclick="changeMonth(-1)">◀</button>
<div id="monthTitle"></div>
<button onclick="changeMonth(1)">▶</button>
</div>
<div class="calendar" id="calendarGrid"></div>
</div>

<div id="regular" class="section">
<h3>Rendszeres</h3>
<input id="regularName" placeholder="Program neve">
<input type="datetime-local" id="regularDate">
<select id="regularRepeat">
<option value="none">Nem ismétlődik</option>
<option value="weekly">Hetente</option>
<option value="monthly">Havonta</option>
</select>
<button class="addBtn" onclick="addEvent('regular')">Hozzáadás</button>
<div id="regularList"></div>
</div>

<div id="school" class="section">
<h3>Iskola</h3>
<input id="schoolName">
<input type="datetime-local" id="schoolDate">
<button class="addBtn" onclick="addEvent('school')">Hozzáadás</button>
<div id="schoolList"></div>
</div>

<div id="afternoon" class="section">
<h3>Délután</h3>
<input id="afternoonName">
<input type="datetime-local" id="afternoonDate">
<button class="addBtn" onclick="addEvent('afternoon')">Hozzáadás</button>
<div id="afternoonList"></div>
</div>

<div id="highlight" class="section">
<h3>Kiemelt</h3>
<input id="highlightName">
<input type="datetime-local" id="highlightDate">
<button class="addBtn" onclick="addEvent('highlight')">Hozzáadás</button>
<div id="highlightList"></div>
</div>

</div>

<footer>
© 2026 Mark Planner
</footer>

<script>

let events = JSON.parse(localStorage.getItem("events")) || [];
let currentMonth = new Date().getMonth();
let currentYear = new Date().getFullYear();

function save(){
    localStorage.setItem("events", JSON.stringify(events));
}

function toggleMode(){
    document.body.classList.toggle("dark");
    localStorage.setItem("mode", document.body.classList.contains("dark") ? "dark":"light");
}

if(localStorage.getItem("mode")==="dark"){
    document.body.classList.add("dark");
}

function showSection(id){
    document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
    document.getElementById(id).classList.add("active");
    render();
}

function addEvent(type){
    let name=document.getElementById(type+"Name").value;
    let date=document.getElementById(type+"Date").value;
    let repeat=document.getElementById(type+"Repeat")?document.getElementById(type+"Repeat").value:"none";

    if(!name||!date) return alert("Hiányzó adat!");

    if(events.some(e=>e.date===date)) return alert("Időpont ütközés!");

    events.push({type,name,date,repeat});
    save();
    render();
}

function render(){

    let now=new Date();
    let todayStr=now.toISOString().split("T")[0];

    events=events.filter(e=>{
        let d=new Date(e.date);
        return !(e.repeat==="none" && d<now);
    });

    save();

    document.getElementById("todayList").innerHTML="";
    ["regular","school","afternoon","highlight"].forEach(t=>{
        document.getElementById(t+"List").innerHTML="";
    });

    events.forEach(e=>{
        let d=new Date(e.date);
        let div=document.createElement("div");
        div.className="event";
        if(e.type==="highlight") div.classList.add("highlightEvent");
        div.innerHTML=`${e.name}<br>${d.toLocaleString()}`;

        document.getElementById(e.type+"List")?.appendChild(div);

        if(d.toISOString().split("T")[0]===todayStr){
            document.getElementById("todayList").appendChild(div.cloneNode(true));
        }
    });

    renderCalendar();
}

function renderCalendar(){
    const grid=document.getElementById("calendarGrid");
    grid.innerHTML="";
    const firstDay=new Date(currentYear,currentMonth,1);
    const lastDay=new Date(currentYear,currentMonth+1,0);

    document.getElementById("monthTitle").innerText=
        firstDay.toLocaleString("hu-HU",{month:"long",year:"numeric"});

    for(let i=1;i<=lastDay.getDate();i++){
        let dayDiv=document.createElement("div");
        dayDiv.className="day";

        let today=new Date();
        if(i===today.getDate() && currentMonth===today.getMonth() && currentYear===today.getFullYear()){
            dayDiv.classList.add("today");
        }

        dayDiv.innerHTML=`<div class="dayNumber">${i}</div>`;

        events.forEach(e=>{
            let d=new Date(e.date);
            if(d.getDate()===i && d.getMonth()===currentMonth && d.getFullYear()===currentYear){
                let ev=document.createElement("div");
                ev.className="event";
                if(e.type==="highlight") ev.classList.add("highlightEvent");
                ev.innerText=e.name;
                dayDiv.appendChild(ev);
            }
        });

        grid.appendChild(dayDiv);
    }
}

function changeMonth(dir){
    currentMonth+=dir;
    if(currentMonth<0){currentMonth=11;currentYear--;}
    if(currentMonth>11){currentMonth=0;currentYear++;}
    renderCalendar();
}

render();

</script>

</body>
</html>
