<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mark Életszervező</title>

<style>
body{
    margin:0;
    font-family: Arial, sans-serif;
    background:#f1f5f9;
}

header{
    background:#0f172a;
    color:white;
    padding:15px;
    text-align:center;
}

nav{
    display:flex;
    flex-wrap:wrap;
    background:#1e293b;
}

nav button{
    flex:1;
    padding:12px;
    border:none;
    background:#1e293b;
    color:white;
    cursor:pointer;
}

nav button:hover{
    background:#334155;
}

.container{
    padding:20px;
    max-width:1200px;
    margin:auto;
}

.section{
    display:none;
    background:white;
    padding:20px;
    border-radius:10px;
    box-shadow:0 3px 10px rgba(0,0,0,0.1);
}

.active{
    display:block;
}

input, select, button{
    width:100%;
    padding:8px;
    margin:5px 0;
    box-sizing:border-box;
}

.addBtn{
    background:#2563eb;
    color:white;
    border:none;
    border-radius:6px;
}

.event{
    background:#e2e8f0;
    padding:6px;
    margin:4px 0;
    border-left:4px solid #2563eb;
    border-radius:6px;
    font-size:14px;
}

.highlightEvent{
    background:#ffe4e6;
    border-left:6px solid #dc2626;
    font-weight:bold;
}

footer{
    background:#0f172a;
    color:white;
    text-align:center;
    padding:10px;
    margin-top:30px;
}

/* NAPTÁR */
.calendar{
    display:grid;
    grid-template-columns: repeat(7,1fr);
    gap:5px;
}

.day{
    min-height:100px;
    background:#f8fafc;
    padding:5px;
    border-radius:6px;
    font-size:12px;
}

.today{
    border:2px solid #2563eb;
}

.dayNumber{
    font-weight:bold;
}

.calendarHeader{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:10px;
}

@media(max-width:600px){
    .calendar{
        grid-template-columns: repeat(2,1fr);
    }
}
</style>
</head>
<body>

<header>
<h1>📅 Mark Életszervező</h1>
</header>

<nav>
<button onclick="showSection('today')">Ma</button>
<button onclick="showSection('calendar')">Havi Naptár</button>
<button onclick="showSection('regular')">Rendszeres</button>
<button onclick="showSection('school')">Iskola</button>
<button onclick="showSection('afternoon')">Délután</button>
<button onclick="showSection('highlight')">Kiemelt</button>
</nav>

<div class="container">

<div id="today" class="section active">
<h2>Mai programok</h2>
<div id="todayList"></div>
</div>

<div id="calendar" class="section">
<div class="calendarHeader">
<button onclick="changeMonth(-1)">◀</button>
<h2 id="monthTitle"></h2>
<button onclick="changeMonth(1)">▶</button>
</div>
<div class="calendar" id="calendarGrid"></div>
</div>

<!-- A többi rész változatlan logikával -->

<div id="regular" class="section">
<h2>Rendszeres</h2>
<input type="text" id="regularName">
<input type="datetime-local" id="regularDate">
<select id="regularRepeat">
<option value="none">Nem ismétlődik</option>
<option value="weekly">Hetente</option>
<option value="monthly">Havonta</option>
</select>
<button class="addBtn" onclick="addEvent('regular')">Hozzáadás</button>
<div id="regularList"></div>
</div>

<div id="school" class="section">
<h2>Iskola</h2>
<input type="text" id="schoolName">
<input type="datetime-local" id="schoolDate">
<button class="addBtn" onclick="addEvent('school')">Hozzáadás</button>
<div id="schoolList"></div>
</div>

<div id="afternoon" class="section">
<h2>Délután</h2>
<input type="text" id="afternoonName">
<input type="datetime-local" id="afternoonDate">
<button class="addBtn" onclick="addEvent('afternoon')">Hozzáadás</button>
<div id="afternoonList"></div>
</div>

<div id="highlight" class="section">
<h2>Kiemelt</h2>
<input type="text" id="highlightName">
<input type="datetime-local" id="highlightDate">
<button class="addBtn" onclick="addEvent('highlight')">Hozzáadás</button>
<div id="highlightList"></div>
</div>

</div>

<footer>
© 2026 Mark Életszervező
</footer>

<script>

let events = JSON.parse(localStorage.getItem("events")) || [];
let currentMonth = new Date().getMonth();
let currentYear = new Date().getFullYear();

function saveEvents(){
    localStorage.setItem("events", JSON.stringify(events));
}

function showSection(id){
    document.querySelectorAll(".section").forEach(s => s.classList.remove("active"));
    document.getElementById(id).classList.add("active");
    render();
}

function addEvent(type){

    let name = document.getElementById(type+"Name").value;
    let date = document.getElementById(type+"Date").value;
    let repeat = document.getElementById(type+"Repeat") ? document.getElementById(type+"Repeat").value : "none";

    if(!name || !date){
        alert("Tölts ki minden mezőt!");
        return;
    }

    if(events.some(e => e.date === date)){
        alert("⚠️ Ütközés van ebben az időpontban!");
        return;
    }

    events.push({type,name,date,repeat});
    saveEvents();
    render();
}

function render(){

    let todayStr = new Date().toISOString().split("T")[0];
    let now = new Date();

    events = events.filter(e=>{
        let d = new Date(e.date);
        return !(e.repeat==="none" && d<now);
    });

    saveEvents();

    document.getElementById("todayList").innerHTML="";
    ["regular","school","afternoon","highlight"].forEach(type=>{
        document.getElementById(type+"List").innerHTML="";
    });

    events.forEach(e=>{
        let d=new Date(e.date);
        let dateOnly=d.toISOString().split("T")[0];

        let div=document.createElement("div");
        div.className="event";
        if(e.type==="highlight") div.classList.add("highlightEvent");

        div.innerHTML=`${e.name}<br>${d.toLocaleString()}`;

        document.getElementById(e.type+"List")?.appendChild(div);

        if(dateOnly===todayStr){
            document.getElementById("todayList").appendChild(div.cloneNode(true));
        }
    });

    renderCalendar();
}

function renderCalendar(){

    const grid=document.getElementById("calendarGrid");
    grid.innerHTML="";

    const firstDay=new Date(currentYear,currentMonth,1);
    const lastDay=new Date(currentYear,currentMonth+1,0);

    document.getElementById("monthTitle").innerText=
        firstDay.toLocaleString("hu-HU",{month:"long",year:"numeric"});

    for(let i=1;i<=lastDay.getDate();i++){
        let dayDiv=document.createElement("div");
        dayDiv.className="day";

        let today=new Date();
        if(i===today.getDate() && currentMonth===today.getMonth() && currentYear===today.getFullYear()){
            dayDiv.classList.add("today");
        }

        dayDiv.innerHTML=`<div class="dayNumber">${i}</div>`;

        events.forEach(e=>{
            let d=new Date(e.date);
            if(d.getDate()===i && d.getMonth()===currentMonth && d.getFullYear()===currentYear){
                let ev=document.createElement("div");
                ev.className="event";
                if(e.type==="highlight") ev.classList.add("highlightEvent");
                ev.innerText=e.name;
                dayDiv.appendChild(ev);
            }
        });

        grid.appendChild(dayDiv);
    }
}

function changeMonth(direction){
    currentMonth+=direction;
    if(currentMonth<0){currentMonth=11;currentYear--;}
    if(currentMonth>11){currentMonth=0;currentYear++;}
    renderCalendar();
}

render();

</script>

</body>
</html>
